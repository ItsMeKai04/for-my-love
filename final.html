<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday KB ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

<script>

function celebrate(){

    confetti({
        particleCount:100,
        angle:60,
        spread:70,
        origin:{x:0}
    });

    confetti({
        particleCount:100,
        angle:120,
        spread:70,
        origin:{x:1}
    });

}

celebrate();

</script>

</script>

<body>

<div class="container">

<div class="card">

<h1>🎉 Happy Birthday KB ❤️</h1>

<p class="finalText">

Thank you for staying until the end. 🥹❤️

I know this is just a simple little website,

but every page was made especially for you.

I hope today brings you lots of happiness,

lots of laughter,

and beautiful memories.

Happy Birthday once again.

❤️

</p>

<img src="images/photo1.jpg" class="finalPhoto">

<br><br>

<h2>🥰 I Hope You Like It</h2>

</div>

</div>

<script>

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
